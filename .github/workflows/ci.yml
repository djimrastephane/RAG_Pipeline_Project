name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir \
            numpy==1.26.4 \
            pandas==2.3.3 \
            pyarrow==23.0.0 \
            tiktoken==0.12.0 \
            rank-bm25==0.2.2 \
            scikit-learn==1.5.2 \
            PyYAML==6.0.3 \
            pytest==8.3.5
          pip install --no-cache-dir -e . --no-deps

      - name: Run tests
        run: pytest tests/ -q --tb=short
