  - name: thesis_chunk_280_90_seg_on_wholemd_dense_rerank_on
    doc_id: Grampian-2024-2025
    data_mode: rebuild
    mode: baseline
    chunking:
      size_tokens: 280
      overlap_tokens: 90
      segment_aware: true
      whole_doc_markdown_mode: true
