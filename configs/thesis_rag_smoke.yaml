paths:
  project_root: ..
  data_dir: ../runs/smoke_input
  processed_dir: ../processed
  indexes_dir: ../indexes
  runs_dir: ../runs
  query_set_path: ../data_processed/Grampian-2022-2023/eval_set.json
  model_cache_dir: ../models

runtime:
  device: cpu
  random_seed: 13
  deterministic_torch: true
  offline: true
  log_level: INFO
  corpus_name: thesis-rag-smoke
  dataset_version: smoke-grampian-2022-2023

ocr:
  enabled: true
  min_chars_before_fallback: 80
  min_alpha_ratio: 0.30
  min_digit_ratio: 0.60

chunking:
  chunk_size_tokens: 224
  chunk_overlap_tokens: 56
  min_chunk_words: 20
  table_chunking_strategy: baseline

embedding:
  model_name: ../models/all-MiniLM-L6-v2
  normalize_embeddings: true
  batch_size: 32
  expected_dimension: 384

faiss:
  index_type: IndexFlatIP

bm25:
  k1: 1.5
  b: 0.75

retrieval:
  dense_top_k: 10
  sparse_top_k: 10
  hybrid_top_k: 10
  rrf_k: 20
  dense_weight: 0.5
  sparse_weight: 2.0

evaluation:
  ks: [1, 3, 5, 10]
